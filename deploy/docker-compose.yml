# ResQHub — прод-стек на одному дроплеті DigitalOcean.
# Caddy (80/443) — єдиний вхід; backend і frontend не публікують портів назовні.
#
# Запуск:   cd /opt/orbit/deploy && docker compose up -d --build
# Логи:     docker compose logs -f
# Оновлення: docker compose up -d --build <service>
#
# Самовідновлення (без ручних втручань):
#   - healthcheck б'є в ендпоінт, що ЧИТАЄ БД (ловить «завислий» бекенд,
#     а не лише мертвий процес);
#   - autoheal перезапускає будь-який unhealthy-контейнер;
#   - бекенд щогодини чистить телеметрію >24 год (БД не росте безмежно);
#   - сценарій блекауту сам скидається через 10 хв (TTL на бекенді).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: "sqlite:////data/resqhub.db"
      CORS_ORIGINS: "https://resqhub.systems,http://resqhub.systems,http://64.226.67.86,http://localhost:3000"
    volumes:
      - dbdata:/data
    expose:
      - "8000"
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      # /api/dashboard читає БД → ловимо і мертвий процес, і завислий SQLite.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/dashboard', timeout=8)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    # Без NEXT_PUBLIC_* — фронт бере API/WS із поточного origin у рантаймі,
    # тож той самий образ працює на будь-якому домені/протоколі.
    build:
      context: ../frontend
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok||r.status===307?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  simulator:
    build:
      context: ../simulator
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    logging: *default-logging

  # Перезапускає контейнери, що стали unhealthy (Docker сам цього не робить).
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging: *default-logging

volumes:
  dbdata:
  caddy_data:
  caddy_config:
